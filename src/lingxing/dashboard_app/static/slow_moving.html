<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>亚马逊 FBA 断货预警</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(248, 113, 113, .22), transparent 30%),
        radial-gradient(circle at 82% 8%, rgba(245, 158, 11, .2), transparent 28%),
        linear-gradient(135deg, #0c0a09, #1c1917 50%, #0c0a09);
    }
    .screen { width: min(1600px, 100%); margin: 0 auto; padding: 24px; }
    .topbar { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 18px; margin-bottom: 18px; }
    .title { text-align: center; }
    h1 { margin: 0; font-size: 32px; letter-spacing: .12em; text-shadow: 0 0 24px rgba(248, 113, 113, .42); }
    .sub { color: #94a3b8; margin-top: 8px; font-size: 13px; }
    .nav-switch { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .nav-switch a { color: #94a3b8; text-decoration: none; border: 1px solid rgba(248, 113, 113, .28); border-radius: 999px; padding: 6px 10px; font-size: 12px; background: rgba(15, 12, 10, .72); }
    .nav-switch a:hover { color: #fecaca; border-color: #f87171; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 10px; color: #94a3b8; font-size: 13px; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: rgba(15, 12, 10, .72); border: 1px solid rgba(148, 163, 184, .28); }
    .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, .5); }
    .status-pill.no-data .dot { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, .5); }
    .status-pill.error .dot { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, .5); }
    .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin-top: 18px; }
    .kpi-card { background: linear-gradient(180deg, rgba(28, 25, 23, .88), rgba(15, 12, 10, .72)); border: 1px solid rgba(248, 113, 113, .22); border-radius: 16px; padding: 18px; text-align: center; }
    .kpi-card .value { font-size: 38px; font-weight: 900; color: #fecaca; text-shadow: 0 0 18px rgba(248, 113, 113, .42); }
    .kpi-card .label { color: #94a3b8; margin-top: 4px; font-size: 13px; }
    .kpi-card.urgent .value { color: #fee2e2; }
    .main { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 18px; margin-top: 18px; align-items: stretch; }
    .panel { background: linear-gradient(180deg, rgba(28, 25, 23, .88), rgba(15, 12, 10, .72)); border: 1px solid rgba(248, 113, 113, .18); border-radius: 20px; padding: 18px; }
    .panel h2 { margin: 0 0 12px; font-size: 16px; color: #fed7aa; letter-spacing: .04em; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .filters select, .filters input { color: #fde68a; border: 1px solid rgba(248, 113, 113, .28); border-radius: 8px; padding: 6px 10px; background: rgba(15, 12, 10, .72); font-size: 12px; }
    .filters button { cursor: pointer; color: #fecaca; border: 1px solid rgba(248, 113, 113, .42); border-radius: 8px; padding: 6px 12px; background: rgba(127, 29, 29, .3); font-size: 12px; }
    .filters button:hover { background: rgba(127, 29, 29, .5); }
    .table-wrap { max-height: 580px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: #94a3b8; font-weight: 500; padding: 8px 6px; border-bottom: 1px solid rgba(148, 163, 184, .2); position: sticky; top: 0; background: rgba(28, 25, 23, .95); backdrop-filter: blur(4px); }
    td { padding: 8px 6px; border-bottom: 1px solid rgba(148, 163, 184, .08); color: #e5e7eb; }
    tr:hover td { background: rgba(127, 29, 29, .12); }
    .days-warn { color: #fca5a5; font-weight: 700; }
    .days-crit { color: #fee2e2; font-weight: 900; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
    .badge-zero { background: rgba(239, 68, 68, .25); color: #fee2e2; border: 1px solid rgba(239, 68, 68, .5); }
    .badge-low { background: rgba(245, 158, 11, .2); color: #fde68a; border: 1px solid rgba(245, 158, 11, .5); }
    .badge-ok { background: rgba(34, 197, 94, .15); color: #bbf7d0; border: 1px solid rgba(34, 197, 94, .35); }
    .chart { width: 100%; height: 520px; }
    .empty { text-align: center; color: #94a3b8; padding: 60px 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <div class="nav-switch">
        <a href="/templates/tech">领星大盘</a>
        <a href="/templates/light">浅色版</a>
        <a href="/templates/ops">运营版</a>
      </div>
      <div class="title">
        <h1>🚨 亚马逊 FBA 断货预警</h1>
        <div class="sub">库存看板 · 每日 02:30 计算 · 看板 only 不推送</div>
      </div>
      <div class="nav-switch">
        <a href="#" onclick="location.reload(); return false;">🔄 刷新</a>
      </div>
    </div>

    <div class="status-bar">
      <div>
        <span id="status-pill" class="status-pill"><span class="dot"></span><span id="status-text">加载中…</span></span>
        &nbsp;·&nbsp;
        <span id="data-date">—</span>
      </div>
      <div id="generated-at">—</div>
    </div>

    <div class="kpis">
      <div class="kpi-card urgent">
        <div class="value" id="kpi-red">—</div>
        <div class="label">🚨 当前红灯</div>
      </div>
      <div class="kpi-card urgent">
        <div class="value" id="kpi-min-days">—</div>
        <div class="label">⏱ 最紧急天数</div>
      </div>
      <div class="kpi-card">
        <div class="value" id="kpi-owners">—</div>
        <div class="label">👥 涉及负责人</div>
      </div>
      <div class="kpi-card">
        <div class="value" id="kpi-countries">—</div>
        <div class="label">🌏 涉及国家</div>
      </div>
    </div>

    <div class="main">
      <div class="panel" style="grid-column: span 1;">
        <h2>Top 紧急红灯 (按预计断货天数升序)</h2>
        <div class="filters">
          <select id="filter-country"><option value="">全部国家</option></select>
          <select id="filter-shop"><option value="">全部店铺</option></select>
          <select id="filter-owner"><option value="">全部负责人</option></select>
          <button onclick="resetFilters()">重置</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ASIN</th>
                <th>SKU</th>
                <th>国家</th>
                <th>店铺</th>
                <th>负责人</th>
                <th style="text-align:right;">可售</th>
                <th style="text-align:right;">日均</th>
                <th style="text-align:right;">天数</th>
                <th style="text-align:right;">阈值</th>
                <th>原因</th>
              </tr>
            </thead>
            <tbody id="rows-tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="panel">
        <h2>🌏 国家分布</h2>
        <div id="chart-country" class="chart"></div>
      </div>
      <div class="panel">
        <h2>👥 负责人分布</h2>
        <div id="chart-owner" class="chart"></div>
      </div>
    </div>
  </div>

  <script src="/static/slow_moving.js"></script>
</body>
</html>
