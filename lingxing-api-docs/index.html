<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>领星 API 文档（本地离线版）</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="description" content="领星 ERP API 文档 - 本地离线版">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    .sidebar { width: 320px; }
    .markdown-section { max-width: 1100px; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section pre { font-size: 13px; }
    .app-name-link img { max-width: 180px; }
  </style>
</head>
<body>
  <div id="app">📚 加载中…</div>
  <script>
    window.$docsify = {
      name: '领星 API 文档',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      maxLevel: 4,
      auto2top: true,
      homepage: 'docs/Guidance/AppID.md',
      mergeNavbar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 搜索接口名/参数/路径...',
        noData: '没找到相关接口 😢',
        depth: 6,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText: '复制',
        errorText: '失败',
        successText: '已复制 ✓'
      },
      pagination: {
        previousText: '← 上一篇',
        nextText: '下一篇 →',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook) {
          hook.afterEach(function(html) {
            return html + '\n\n<hr/><small style="color:#999">📌 本地离线版 · 由 ' +
                   '<a href="https://apidoc.lingxing.com/" target="_blank">apidoc.lingxing.com</a> 镜像生成</small>';
          });
        }
      ]
    }
  </script>
  <!-- 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- 复制代码插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <!-- 分页导航插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- 代码高亮 -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
</body>
</html>
